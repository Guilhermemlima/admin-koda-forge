<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Koda Forge | Central de Gestão</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:system-ui,-apple-system,sans-serif;margin:0;overflow-x:hidden}

/* Scrollbar */
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#94a3b8;border-radius:3px}

/* Sidebar — mobile: drawer, desktop: static */
#sidebar{position:fixed;top:0;left:0;height:100%;width:240px;z-index:40;transform:translateX(-100%);transition:transform .25s ease;display:flex;flex-direction:column;background:#0f172a;overflow-y:auto}
#sidebar.open{transform:translateX(0)}
@media(min-width:768px){
  #sidebar{position:relative;transform:none;flex-shrink:0}
  #mob-overlay{display:none!important}
  #mob-nav{display:none!important}
  #mc{padding-bottom:24px!important}
  #mob-menu-btn{display:none!important}
}

/* Overlay */
#mob-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:39;display:none;backdrop-filter:blur(2px)}
#mob-overlay.show{display:block}

/* Bottom nav mobile */
#mob-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e2e8f0;z-index:30;display:flex;padding:6px 0;padding-bottom:max(6px,env(safe-area-inset-bottom))}
.mn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:2px 4px;font-size:9px;font-weight:600;color:#94a3b8;cursor:pointer;border:none;background:none;transition:color .15s;letter-spacing:.02em}
.mn i{font-size:20px;display:block}
.mn.mna{color:#6366f1}
.mn.mna i{color:#6366f1}

/* Nav buttons sidebar */
.nb{width:100%;display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;color:#94a3b8;font-size:14px;font-weight:500;cursor:pointer;background:none;border:none;text-align:left;border-left:3px solid transparent;transition:all .15s}
.nb:hover{background:rgba(255,255,255,.06);color:#e2e8f0}
.na{background:rgba(99,102,241,.15)!important;color:#818cf8!important;border-left-color:#6366f1!important}
.nl{font-size:10px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.08em;padding:4px 12px;margin-top:8px;display:block}

/* Cards */
.card{background:#fff;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.kpi{transition:transform .15s,box-shadow .15s}
@media(min-width:768px){.kpi:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,.1)}}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:14px;font-weight:500;transition:all .15s;white-space:nowrap}
.bp{background:#6366f1;color:#fff}.bp:hover{background:#4f46e5}
.bs{background:#f1f5f9;color:#475569}.bs:hover{background:#e2e8f0}
.bsm{padding:7px 10px;font-size:12px;border-radius:6px;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:4px;transition:all .15s}
.be{background:#eff6ff;color:#2563eb}.be:hover{background:#dbeafe}
.bd{background:#fee2e2;color:#dc2626}.bd:hover{background:#fecaca}

/* Form */
.fi{width:100%;padding:10px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:15px;outline:none;transition:border-color .15s;background:#fff;-webkit-appearance:none;appearance:none}
.fi:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.1)}
.fl{display:block;font-size:12px;font-weight:600;color:#64748b;margin-bottom:4px}

/* Badges */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.bn{background:#dbeafe;color:#1d4ed8}.bc{background:#fef3c7;color:#b45309}
.bq{background:#ede9fe;color:#6d28d9}.bpr{background:#fce7f3;color:#be185d}
.bco{background:#dcfce7;color:#15803d}.bpe{background:#fee2e2;color:#b91c1c}
.bcf{background:#dcfce7;color:#15803d}.bpd{background:#fef3c7;color:#b45309}.bca{background:#fee2e2;color:#b91c1c}
.bfx{background:#fef9c3;color:#854d0e}.bvr{background:#dbeafe;color:#1d4ed8}
.bi{background:#e0e7ff;color:#3730a3}

/* Modal */
.mw{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:50;display:none;align-items:flex-end;justify-content:center;padding:0}
.mw.open{display:flex}
.mo{background:#fff;border-radius:20px 20px 0 0;width:100%;max-height:95vh;overflow-y:auto;animation:slideUp .2s ease}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
@media(min-width:640px){
  .mw{align-items:center;padding:16px}
  .mo{border-radius:16px;max-width:560px;animation:none}
}

/* Table */
table{width:100%;border-collapse:collapse}
th{background:#f8fafc;padding:10px 14px;text-align:left;font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
td{padding:10px 14px;font-size:13px;color:#334155;border-top:1px solid #f1f5f9;white-space:nowrap}
tr:hover td{background:#fafafa}

/* Mobile cards for lists (hides table on small screens) */
.mob-card{display:block}
.desk-table{display:none}
@media(min-width:640px){.mob-card{display:none}.desk-table{display:block}}

/* Progress bar */
.pb{height:7px;background:#e2e8f0;border-radius:4px;overflow:hidden}
.pf{height:100%;border-radius:4px;transition:width .4s}

/* Empty state */
.em{text-align:center;padding:40px 16px;color:#94a3b8}
.em i{font-size:32px;margin-bottom:10px;display:block}

/* Toast */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);z-index:100;background:#1e293b;color:#fff;padding:11px 20px;border-radius:10px;font-size:13px;opacity:0;transition:all .25s;white-space:nowrap;max-width:90vw;text-align:center}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
@media(min-width:768px){.toast{bottom:24px;left:auto;right:24px;transform:translateY(10px)}.toast.show{transform:translateY(0)}}

/* Firebase badge */
.fb-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.fb-on{background:#dcfce7;color:#15803d}
.fb-off{background:#fee2e2;color:#b91c1c}

/* Misc */
.safe-bottom{padding-bottom:max(80px,calc(80px + env(safe-area-inset-bottom)))}
@media(min-width:768px){.safe-bottom{padding-bottom:24px}}
@media print{#sidebar,header,#mob-nav,.no-print{display:none!important}#mc{padding:0!important}}
</style>
</head>
<body class="bg-slate-100">

<!-- Mobile overlay -->
<div id="mob-overlay" data-action="close-sidebar"></div>

<!-- Layout -->
<div class="flex h-screen overflow-hidden">

  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="p-5 border-b border-slate-800 flex-shrink-0">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center flex-shrink-0">
            <i class="fas fa-bolt text-white text-xs"></i>
          </div>
          <div>
            <div class="text-white font-bold text-sm">Koda Forge</div>
            <div id="fb-status" class="fb-badge fb-off mt-0.5"><i class="fas fa-circle" style="font-size:7px"></i>Local</div>
          </div>
        </div>
        <button data-action="close-sidebar" class="text-slate-500 hover:text-slate-300 bg-transparent border-0 cursor-pointer md:hidden p-1">
          <i class="fas fa-times text-lg"></i>
        </button>
      </div>
    </div>
    <nav class="flex-1 p-3 space-y-0.5">
      <span class="nl">Principal</span>
      <button class="nb na" data-action="nav" data-page="dashboard"><i class="fas fa-chart-pie w-4 text-center"></i>Dashboard</button>
      <button class="nb" data-action="nav" data-page="leads"><i class="fas fa-user-plus w-4 text-center"></i>Leads<span id="bl" class="ml-auto text-xs bg-slate-700 text-slate-300 px-1.5 py-0.5 rounded-full hidden"></span></button>
      <button class="nb" data-action="nav" data-page="vendas"><i class="fas fa-handshake w-4 text-center"></i>Vendas<span id="bv" class="ml-auto text-xs bg-slate-700 text-slate-300 px-1.5 py-0.5 rounded-full hidden"></span></button>
      <button class="nb" data-action="nav" data-page="gastos"><i class="fas fa-receipt w-4 text-center"></i>Gastos</button>
      <span class="nl">Análise</span>
      <button class="nb" data-action="nav" data-page="metas"><i class="fas fa-bullseye w-4 text-center"></i>Metas</button>
      <button class="nb" data-action="nav" data-page="relatorios"><i class="fas fa-chart-bar w-4 text-center"></i>Relatórios</button>
      <span class="nl">Sistema</span>
      <button class="nb" data-action="nav" data-page="config"><i class="fas fa-sliders w-4 text-center"></i>Configurações</button>
    </nav>
    <div class="p-4 border-t border-slate-800 text-center text-slate-600 text-xs flex-shrink-0">Koda Forge © 2026</div>
  </aside>

  <!-- Main -->
  <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
    <!-- Header -->
    <header class="bg-white border-b border-slate-200 px-4 py-3 flex items-center justify-between flex-shrink-0 no-print" style="padding-top:max(12px,env(safe-area-inset-top))">
      <div class="flex items-center gap-3">
        <button id="mob-menu-btn" data-action="open-sidebar" class="w-9 h-9 flex items-center justify-center rounded-lg text-slate-500 hover:bg-slate-100 bg-transparent border-0 cursor-pointer">
          <i class="fas fa-bars text-lg"></i>
        </button>
        <h1 id="ptitle" class="font-bold text-slate-800 text-base">Dashboard</h1>
      </div>
      <div class="flex items-center gap-1.5">
        <button data-action="new-item" class="btn bp md:hidden" style="padding:7px 14px;font-size:13px">
          <i class="fas fa-plus"></i>
        </button>
        <div class="hidden md:flex items-center gap-2">
          <button data-action="import" class="btn bs" style="padding:6px 12px;font-size:12px"><i class="fas fa-file-import"></i> Importar</button>
          <button data-action="export" class="btn bs" style="padding:6px 12px;font-size:12px"><i class="fas fa-file-export"></i> Exportar</button>
          <button data-action="demo" class="btn bs" style="padding:6px 12px;font-size:12px"><i class="fas fa-database"></i> Demo</button>
        </div>
        <button data-action="export" class="md:hidden w-9 h-9 flex items-center justify-center rounded-lg text-slate-500 hover:bg-slate-100 bg-transparent border-0 cursor-pointer">
          <i class="fas fa-file-export"></i>
        </button>
      </div>
    </header>
    <main id="mc" class="flex-1 overflow-y-auto p-3 md:p-6 safe-bottom"></main>
  </div>
</div>

<!-- Bottom nav mobile -->
<nav id="mob-nav">
  <button class="mn mna" data-action="nav" data-page="dashboard"><i class="fas fa-chart-pie"></i>Dashboard</button>
  <button class="mn" data-action="nav" data-page="leads"><i class="fas fa-user-plus"></i>Leads</button>
  <button class="mn" data-action="nav" data-page="vendas"><i class="fas fa-handshake"></i>Vendas</button>
  <button class="mn" data-action="nav" data-page="gastos"><i class="fas fa-receipt"></i>Gastos</button>
  <button class="mn" data-action="open-sidebar"><i class="fas fa-bars"></i>Menu</button>
</nav>

<!-- Modal -->
<div id="mwrap" class="mw">
  <div class="mo" id="mdiv"></div>
</div>

<div id="toast" class="toast"></div>
<input type="file" id="impf" accept=".json" style="display:none">

<script>
// ── Constants ────────────────────────────────────────────────────────────────
const LSK='kf_v2', FBK='kf_fb';
const LEAD_ST=['Novo','Contatado','Qualificado','Proposta Enviada','Convertido','Perdido'];
const LEAD_FT=['Indicação','Instagram','Facebook','Google','Site','LinkedIn','WhatsApp','Evento','Outro'];
const GCAT=['Salários','Comissões','Marketing','Infraestrutura','Software/Assinaturas','Impostos','Aluguel','Outras'];
const PAG=['PIX','Boleto','Cartão de Crédito','Cartão de Débito','Transferência','Dinheiro'];
const VND_ST=['Confirmada','Pendente','Cancelada'];
const MO_PT=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const MO_SH=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

// ── State ────────────────────────────────────────────────────────────────────
let D={leads:[],vendas:[],gastos:[],metas:{},socios:['Guilherme','Vinicius','Alisson','Italo']};
let CH={}, curMo=new Date().toISOString().slice(0,7), curPage='dashboard';
let lF={s:'',st:'',resp:''}, vF={s:'',st:'',resp:''}, gF={s:'',cat:'',tipo:''};
let db=null, unsubs=[], refreshTimer=null;

// ── Utils ────────────────────────────────────────────────────────────────────
const uid   = ()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const R$    = v=>new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(v||0);
const fmtD  = d=>d?new Date(d+'T12:00:00').toLocaleDateString('pt-BR'):'—';
const today = ()=>new Date().toISOString().slice(0,10);
const moLabel= m=>{if(!m)return'';const[y,mo]=m.split('-');return MO_SH[+mo-1]+'/'+y;};
const moName = m=>{if(!m)return'';const[y,mo]=m.split('-');return MO_PT[+mo-1]+' '+y;};
const esc    = s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const shiftMo= (m,d)=>{const[y,mo]=m.split('-').map(Number);const dt=new Date(y,mo-1+d,1);return`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}`;};
const isMob  = ()=>window.innerWidth<768;

// ── Toast ────────────────────────────────────────────────────────────────────
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),3000);
}

// ── Sidebar mobile ───────────────────────────────────────────────────────────
function openSidebar(){
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('mob-overlay').classList.add('show');
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('mob-overlay').classList.remove('show');
}

// ── Badges ───────────────────────────────────────────────────────────────────
function updateBadges(){
  const nl=D.leads.filter(l=>l.data?.slice(0,7)===curMo).length;
  const nv=D.vendas.filter(v=>v.data?.slice(0,7)===curMo).length;
  const bl=document.getElementById('bl'),bv=document.getElementById('bv');
  if(bl){bl.textContent=nl;bl.classList.toggle('hidden',!nl);}
  if(bv){bv.textContent=nv;bv.classList.toggle('hidden',!nv);}
}

// ── Mobile bottom nav active ──────────────────────────────────────────────────
function updateMobNav(page){
  document.querySelectorAll('.mn[data-page]').forEach(b=>{
    b.classList.toggle('mna',b.dataset.page===page);
  });
}

// ── Persistence ──────────────────────────────────────────────────────────────
function localSave(){localStorage.setItem(LSK,JSON.stringify(D));updateBadges();}
function localLoad(){try{const s=localStorage.getItem(LSK);if(s)D={...D,...JSON.parse(s)};}catch(e){}}
function loadFBConfig(){try{return JSON.parse(localStorage.getItem(FBK)||'null');}catch(e){return null;}}
function saveFBConfig(cfg){localStorage.setItem(FBK,JSON.stringify(cfg));}

// ── Firebase ─────────────────────────────────────────────────────────────────
function updateFBStatus(on){
  document.querySelectorAll('#fb-status').forEach(el=>{
    el.className='fb-badge '+(on?'fb-on':'fb-off');
    el.innerHTML=`<i class="fas fa-circle" style="font-size:7px"></i>${on?'Online':'Local'}`;
  });
}
function initFirebase(cfg){
  try{
    if(firebase.apps.length)firebase.apps[0].delete();
    firebase.initializeApp(cfg);db=firebase.firestore();
    setupFBListeners();updateFBStatus(true);
    toast('🔥 Firebase conectado!');return true;
  }catch(e){toast('❌ Erro: '+e.message);db=null;updateFBStatus(false);return false;}
}
function setupFBListeners(){
  unsubs.forEach(u=>u());unsubs=[];
  ['leads','vendas','gastos'].forEach(col=>{
    unsubs.push(db.collection(col).onSnapshot(snap=>{D[col]=snap.docs.map(d=>({...d.data(),id:d.id}));scheduleRefresh();}));
  });
  unsubs.push(db.collection('metas').onSnapshot(snap=>{D.metas={};snap.docs.forEach(d=>{D.metas[d.id]=d.data();});scheduleRefresh();}));
  unsubs.push(db.collection('config').doc('socios').onSnapshot(doc=>{if(doc.exists)D.socios=doc.data().lista||D.socios;scheduleRefresh();}));
}
function scheduleRefresh(){clearTimeout(refreshTimer);refreshTimer=setTimeout(()=>{go(curPage);updateBadges();},250);}
async function dbSet(col,id,data){if(db)await db.collection(col).doc(id).set(data);else localSave();}
async function dbDel(col,id){if(db)await db.collection(col).doc(id).delete();else localSave();}
async function dbSetConfig(key,data){if(db)await db.collection('config').doc(key).set(data);else localSave();}

// ── Export / Import ───────────────────────────────────────────────────────────
function doExport(){
  const blob=new Blob([JSON.stringify(D,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`kodaforge-${today()}.json`;a.click();URL.revokeObjectURL(a.href);
  toast('✅ Dados exportados!');
}
function doImport(){document.getElementById('impf').click();}
document.getElementById('impf').addEventListener('change',e=>{
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=async ev=>{
    try{
      const imp=JSON.parse(ev.target.result);
      if(!confirm('Substituir todos os dados pelos do arquivo?'))return;
      if(db){
        for(const col of['leads','vendas','gastos'])for(const item of(imp[col]||[]))await db.collection(col).doc(item.id).set(item);
        if(imp.metas)for(const[k,v]of Object.entries(imp.metas))await db.collection('metas').doc(k).set(v);
        if(imp.socios)await dbSetConfig('socios',{lista:imp.socios});
      }else{D={...D,...imp};localSave();go(curPage);}
      toast('✅ Importado!');
    }catch(err){alert('Arquivo inválido.');}
  };r.readAsText(f);e.target.value='';
});

// ── Navigation ────────────────────────────────────────────────────────────────
const TITLES={dashboard:'Dashboard',leads:'Leads',vendas:'Vendas',gastos:'Gastos',metas:'Metas',relatorios:'Relatórios',config:'Configurações'};

function go(page){
  curPage=page;
  document.querySelectorAll('[data-action="nav"]').forEach(b=>b.classList.toggle('na',b.dataset.page===page));
  document.getElementById('ptitle').textContent=TITLES[page]||page;
  updateMobNav(page);
  Object.values(CH).forEach(c=>{try{c.destroy();}catch(e){}});CH={};
  const mc=document.getElementById('mc');mc.innerHTML='';
  ({dashboard:renderDash,leads:renderLeads,vendas:renderVendas,gastos:renderGastos,
    metas:renderMetas,relatorios:renderRel,config:renderConfig}[page]||renderDash)(mc);
  if(isMob())closeSidebar();
}

// ── Metrics ───────────────────────────────────────────────────────────────────
function metrics(m){
  const leads=D.leads.filter(l=>l.data?.slice(0,7)===m);
  const vendas=D.vendas.filter(v=>v.data?.slice(0,7)===m&&v.status!=='Cancelada');
  const gastos=D.gastos.filter(g=>g.data?.slice(0,7)===m);
  const bruto=vendas.reduce((s,v)=>s+(+v.valor||0),0);
  const tG=gastos.reduce((s,g)=>s+(+g.valor||0),0);
  const meta=D.metas[m]||{};
  return{leads:{n:leads.length,meta:meta.leads||0},vendas:{n:vendas.length,meta:meta.vendas||0},
    bruto,tG,liquido:bruto-tG,ticket:vendas.length?bruto/vendas.length:0,
    conv:leads.length?(leads.filter(l=>l.status==='Convertido').length/leads.length*100):0,meta};
}

// ── Dashboard ─────────────────────────────────────────────────────────────────
function renderDash(c){
  const m=metrics(curMo);
  const fp=m.meta.faturamento>0?Math.min(m.bruto/m.meta.faturamento*100,100):0;
  const lp=m.meta.leads>0?Math.min(m.leads.n/m.meta.leads*100,100):0;
  const vp=m.meta.vendas>0?Math.min(m.vendas.n/m.meta.vendas*100,100):0;
  const gp=m.meta.gastos_max>0?Math.min(m.tG/m.meta.gastos_max*100,100):0;
  const prg=(pct,color)=>`<div class="pb mt-1.5"><div class="pf ${color}" style="width:${pct}%"></div></div><div class="text-right text-xs mt-0.5 text-slate-400">${pct.toFixed(0)}%</div>`;

  c.innerHTML=`
  <!-- Month nav -->
  <div class="flex items-center justify-between mb-4">
    <div>
      <h2 class="text-base font-bold text-slate-800">Visão Geral</h2>
      <p class="text-slate-400 text-xs">Resumo mensal</p>
    </div>
    <div class="flex items-center gap-1.5">
      <button data-action="prev-month" class="w-8 h-8 rounded-lg bg-white border border-slate-200 text-slate-500 flex items-center justify-center cursor-pointer"><i class="fas fa-chevron-left text-xs"></i></button>
      <div class="bg-white border border-slate-200 rounded-lg px-3 py-1.5 text-xs font-bold text-slate-700 min-w-[110px] text-center">${moName(curMo)}</div>

function mkpi(title,val,ico,color,bg,extra=''){
  return `<div class="card kpi p-3">
    <div class="flex items-start justify-between gap-2">
      <div class="min-w-0">
        <p class="text-slate-400 text-xs font-semibold uppercase tracking-wide truncate">${title}</p>
        <p class="text-lg font-bold mt-0.5 ${color} truncate">${val}</p>
        ${extra}
      </div>
      <div class="w-8 h-8 ${bg} rounded-xl flex items-center justify-center flex-shrink-0">
        <i class="fas ${ico} text-sm ${color}"></i>
      </div>
    </div>
  </div>`;
}

function leadBadge(s){return{Novo:'bn',Contatado:'bc',Qualificado:'bq','Proposta Enviada':'bpr',Convertido:'bco',Perdido:'bpe'}[s]||'bn';}
window.leadBadge=leadBadge;
function vendaBadge(s){return{Confirmada:'bcf',Pendente:'bpd',Cancelada:'bca'}[s]||'bi';}

function recentLeads(){
  const rows=[...D.leads].sort((a,b)=>(b.data||'')>(a.data||'')?1:-1).slice(0,5);
  if(!rows.length)return`<div class="em py-6"><i class="fas fa-user-plus"></i><p class="text-sm">Nenhum lead ainda</p></div>`;
  return rows.map(l=>`<div class="flex justify-between items-center py-2.5 border-b border-slate-100 last:border-0">
    <div class="min-w-0 mr-2"><p class="font-medium text-sm text-slate-700 truncate">${esc(l.nome||'')}</p><p class="text-xs text-slate-400 truncate">${esc(l.fonte||'—')} · ${fmtD(l.data)}</p></div>
    <span class="badge ${leadBadge(l.status)} flex-shrink-0">${esc(l.status||'Novo')}</span>
  </div>`).join('');
}
function recentVendas(){
  const rows=[...D.vendas].sort((a,b)=>(b.data||'')>(a.data||'')?1:-1).slice(0,5);
  if(!rows.length)return`<div class="em py-6"><i class="fas fa-handshake"></i><p class="text-sm">Nenhuma venda ainda</p></div>`;
  return rows.map(v=>`<div class="flex justify-between items-center py-2.5 border-b border-slate-100 last:border-0">
    <div class="min-w-0 mr-2"><p class="font-medium text-sm text-slate-700 truncate">${esc(v.cliente||'')}</p><p class="text-xs text-slate-400 truncate">${esc(v.responsavel||'—')} · ${fmtD(v.data)}</p></div>
    <span class="font-bold text-sm text-green-600 flex-shrink-0">${R$(v.valor)}</span>
  </div>`).join('');
}

function last6(){const ms=[];for(let i=5;i>=0;i--)ms.push(shiftMo(curMo,-i));return ms;}
function initFatChart(){
  const ctx=document.getElementById('ch-fat');if(!ctx)return;
  const ms=last6();
  const b=ms.map(m=>D.vendas.filter(v=>v.data?.slice(0,7)===m&&v.status!=='Cancelada').reduce((s,v)=>s+(+v.valor||0),0));
  const g=ms.map(m=>D.gastos.filter(v=>v.data?.slice(0,7)===m).reduce((s,v)=>s+(+v.valor||0),0));
  CH.fat=new Chart(ctx,{type:'bar',data:{labels:ms.map(moLabel),datasets:[
    {label:'Bruto',data:b,backgroundColor:'rgba(99,102,241,.7)',borderRadius:4},
    {label:'Líquido',data:b.map((v,i)=>v-g[i]),backgroundColor:'rgba(34,197,94,.7)',borderRadius:4},
    {label:'Gastos',data:g,backgroundColor:'rgba(251,191,36,.7)',borderRadius:4},
  ]},options:{responsive:true,maintainAspectRatio:false,
    plugins:{legend:{position:'bottom',labels:{boxWidth:8,font:{size:9},padding:8}}},
    scales:{y:{ticks:{callback:v=>'R$'+(v/1000).toFixed(0)+'k',font:{size:9}},grid:{color:'#f1f5f9'}},x:{ticks:{font:{size:9}},grid:{display:false}}}}});
}
function initLeadsChart(){
  const ctx=document.getElementById('ch-leads');if(!ctx)return;
  const counts=LEAD_ST.map(s=>D.leads.filter(l=>l.status===s).length);
  if(!counts.some(Boolean)){document.getElementById('ch-leads-wrap').innerHTML='<div class="em"><i class="fas fa-chart-pie"></i><p class="text-sm">Sem leads</p></div>';return;}
  CH.leads=new Chart(ctx,{type:'doughnut',data:{labels:LEAD_ST,datasets:[{data:counts,backgroundColor:['#3b82f6','#f59e0b','#8b5cf6','#ec4899','#22c55e','#ef4444'],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,cutout:'60%',plugins:{legend:{position:'bottom',labels:{boxWidth:8,font:{size:9},padding:6}}}}});
}

  }).join('')}</div>`;

function exportCSV(){
  const all=[...new Set([...D.leads.map(l=>l.data?.slice(0,7)),...D.vendas.map(v=>v.data?.slice(0,7)),...D.gastos.map(g=>g.data?.slice(0,7)),curMo])].filter(Boolean).sort().reverse();
  let csv='Mês,Fat. Bruto,Fat. Líquido,Gastos,Leads,Vendas,Ticket Médio\n';
  all.forEach(mo=>{const m=metrics(mo);csv+=`${moLabel(mo)},${m.bruto.toFixed(2)},${m.liquido.toFixed(2)},${m.tG.toFixed(2)},${m.leads.n},${m.vendas.n},${m.ticket.toFixed(2)}\n`;});
  const blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`relatorio-${today()}.csv`;a.click();
  toast('✅ CSV exportado!');
}

async function saveSocios(){
  const inputs=document.querySelectorAll('[id^="socio-"]');
  const lista=[...inputs].map(i=>i.value.trim()).filter(Boolean);
  D.socios=lista;await dbSetConfig('socios',{lista});if(!db)localSave();toast('✅ Equipe salva!');go('config');
}
async function addSocio(){D.socios.push('Novo Sócio');if(!db)localSave();go('config');}
async function rmSocio(i){
  if(D.socios.length<=1){toast('❌ Mínimo 1 sócio.');return;}
  D.socios.splice(i,1);await dbSetConfig('socios',{lista:D.socios});if(!db)localSave();go('config');
}
async function clearAll(){
  if(!confirm('Apagar TODOS os dados?'))return;
  if(!confirm('Tem certeza? Não pode ser desfeito.'))return;
  if(db){const cols=['leads','vendas','gastos','metas'];for(const col of cols){const snap=await db.collection(col).get();for(const d of snap.docs)await d.ref.delete();}}
  else{D={leads:[],vendas:[],gastos:[],metas:{},socios:D.socios};localSave();}
  toast('🗑️ Dados limpos.');go('dashboard');
}
function disconnectFB(){unsubs.forEach(u=>u());unsubs=[];db=null;localStorage.removeItem(FBK);updateFBStatus(false);toast('🔌 Desconectado.');go('config');}

// ── Modal ─────────────────────────────────────────────────────────────────────
function showModal(html){document.getElementById('mdiv').innerHTML=html;document.getElementById('mwrap').classList.add('open');document.body.style.overflow='hidden';}
function closeModal(){document.getElementById('mwrap').classList.remove('open');document.body.style.overflow='';}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
document.getElementById('mwrap').addEventListener('click',e=>{if(e.target===document.getElementById('mwrap'))closeModal();});

// ── Event Delegation ──────────────────────────────────────────────────────────
document.addEventListener('click',e=>{
  const el=e.target.closest('[data-action]');if(!el)return;
  const action=el.dataset.action, id=el.dataset.id||null, page=el.dataset.page||null;
  const H={
    'nav':()=>go(page),
    'open-sidebar':()=>openSidebar(),
    'close-sidebar':()=>closeSidebar(),
    'prev-month':()=>{curMo=shiftMo(curMo,-1);go(curPage);},
    'next-month':()=>{curMo=shiftMo(curMo,1);go(curPage);},
    'new-lead':()=>openLeadModal(),
    'edit-lead':()=>openLeadModal(id),
    'del-lead':()=>delLead(id),
    'new-venda':()=>openVendaModal(),
    'edit-venda':()=>openVendaModal(id),
    'del-venda':()=>delVenda(id),
    'new-gasto':()=>openGastoModal(),
    'edit-gasto':()=>openGastoModal(id),
    'del-gasto':()=>delGasto(id),
    'new-item':()=>{
      const map={leads:'new-lead',vendas:'new-venda',gastos:'new-gasto'};
      if(map[curPage])H[map[curPage]]();
    },
    'close-modal':()=>closeModal(),

});
