<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Koda Forge | Central de Gestão</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;margin:0}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#94a3b8;border-radius:3px}
.nb{width:100%;display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;color:#94a3b8;font-size:14px;font-weight:500;cursor:pointer;background:none;border:none;text-align:left;border-left:3px solid transparent;transition:all .15s}
.nb:hover{background:rgba(255,255,255,.06);color:#e2e8f0}
.na{background:rgba(99,102,241,.15)!important;color:#818cf8!important;border-left-color:#6366f1!important}
.card{background:#fff;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05)}
.kpi{transition:transform .15s,box-shadow .15s}.kpi:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,.1)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:14px;font-weight:500;transition:all .15s}
.bp{background:#6366f1;color:#fff}.bp:hover{background:#4f46e5}
.bs{background:#f1f5f9;color:#475569}.bs:hover{background:#e2e8f0}
.bsm{padding:5px 10px;font-size:12px;border-radius:6px;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:4px}
.be{background:#eff6ff;color:#2563eb}.be:hover{background:#dbeafe}
.bd{background:#fee2e2;color:#dc2626}.bd:hover{background:#fecaca}
.br{background:#fef3c7;color:#b45309}
.fi{width:100%;padding:8px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;outline:none;transition:border-color .15s;background:#fff}
.fi:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.1)}
.fl{display:block;font-size:12px;font-weight:600;color:#64748b;margin-bottom:4px}
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600}
.bn{background:#dbeafe;color:#1d4ed8}.bc{background:#fef3c7;color:#b45309}
.bq{background:#ede9fe;color:#6d28d9}.bpr{background:#fce7f3;color:#be185d}
.bco{background:#dcfce7;color:#15803d}.bpe{background:#fee2e2;color:#b91c1c}
.bcf{background:#dcfce7;color:#15803d}.bpd{background:#fef3c7;color:#b45309}.bca{background:#fee2e2;color:#b91c1c}
.bfx{background:#fef9c3;color:#854d0e}.bvr{background:#dbeafe;color:#1d4ed8}
.bi{background:#e0e7ff;color:#3730a3}
.mw{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50;display:none;align-items:center;justify-content:center;padding:16px}
.mw.open{display:flex}
.mo{background:#fff;border-radius:16px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto}
table{width:100%;border-collapse:collapse}
th{background:#f8fafc;padding:11px 16px;text-align:left;font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.05em}
td{padding:11px 16px;font-size:13px;color:#334155;border-top:1px solid #f1f5f9}
tr:hover td{background:#fafafa}
.pb{height:7px;background:#e2e8f0;border-radius:4px;overflow:hidden}
.pf{height:100%;border-radius:4px;transition:width .4s}
.em{text-align:center;padding:48px 16px;color:#94a3b8}
.em i{font-size:36px;margin-bottom:12px;display:block}
.toast{position:fixed;bottom:20px;right:20px;z-index:100;background:#1e293b;color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;transform:translateY(60px);opacity:0;transition:all .25s;max-width:280px}
.toast.show{transform:translateY(0);opacity:1}
.nl{font-size:10px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.08em;padding:4px 12px;margin-top:8px;display:block}
.fb-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.fb-on{background:#dcfce7;color:#15803d}
.fb-off{background:#fee2e2;color:#b91c1c}
@media print{#sidebar,header,.no-print{display:none!important}#mc{padding:0}}
</style>
</head>
<body class="bg-slate-100">
<div class="flex h-screen overflow-hidden">

<!-- Sidebar -->
<aside id="sidebar" class="w-60 bg-slate-900 flex flex-col flex-shrink-0 overflow-y-auto">
  <div class="p-5 border-b border-slate-800">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center flex-shrink-0">
        <i class="fas fa-bolt text-white text-xs"></i>
      </div>
      <div>
        <div class="text-white font-bold text-sm">Koda Forge</div>
        <div id="fb-status" class="fb-badge fb-off mt-0.5"><i class="fas fa-circle text-[8px]"></i>Local</div>
      </div>
    </div>
  </div>
  <nav class="flex-1 p-3 space-y-0.5">
    <span class="nl">Principal</span>
    <button class="nb na" data-action="nav" data-page="dashboard"><i class="fas fa-chart-pie w-4 text-center"></i>Dashboard</button>
    <button class="nb" data-action="nav" data-page="leads"><i class="fas fa-user-plus w-4 text-center"></i>Leads<span id="bl" class="ml-auto text-xs bg-slate-700 text-slate-300 px-1.5 py-0.5 rounded-full hidden"></span></button>
    <button class="nb" data-action="nav" data-page="vendas"><i class="fas fa-handshake w-4 text-center"></i>Vendas<span id="bv" class="ml-auto text-xs bg-slate-700 text-slate-300 px-1.5 py-0.5 rounded-full hidden"></span></button>
    <button class="nb" data-action="nav" data-page="gastos"><i class="fas fa-receipt w-4 text-center"></i>Gastos</button>
    <span class="nl">Análise</span>
    <button class="nb" data-action="nav" data-page="metas"><i class="fas fa-bullseye w-4 text-center"></i>Metas</button>
    <button class="nb" data-action="nav" data-page="relatorios"><i class="fas fa-chart-bar w-4 text-center"></i>Relatórios</button>
    <span class="nl">Sistema</span>
    <button class="nb" data-action="nav" data-page="config"><i class="fas fa-sliders w-4 text-center"></i>Configurações</button>
  </nav>
  <div class="p-4 border-t border-slate-800 text-center text-slate-600 text-xs">Koda Forge © 2026</div>
</aside>

<!-- Main -->
<div class="flex-1 flex flex-col min-w-0 overflow-hidden">
  <header class="bg-white border-b border-slate-200 px-6 py-3.5 flex items-center justify-between flex-shrink-0 no-print">
    <h1 id="ptitle" class="font-bold text-slate-800 text-base">Dashboard</h1>
    <div class="flex items-center gap-2">
      <button data-action="import" class="btn bs" style="padding:6px 12px;font-size:12px"><i class="fas fa-file-import"></i> Importar</button>
      <button data-action="export" class="btn bs" style="padding:6px 12px;font-size:12px"><i class="fas fa-file-export"></i> Exportar</button>
      <button data-action="demo" class="btn bs" style="padding:6px 12px;font-size:12px"><i class="fas fa-database"></i> Demo</button>
      <input type="file" id="impf" accept=".json" style="display:none">
    </div>
  </header>
  <main id="mc" class="flex-1 overflow-y-auto p-6"></main>
</div>
</div>

<!-- Modal -->
<div id="mwrap" class="mw">
  <div class="mo" id="mdiv"></div>
</div>

<!-- Toast -->
<div id="toast" class="toast"></div>

<script>
// ── Constants ────────────────────────────────────────────────────────────────
const LSK = 'kf_v2';
const FBK = 'kf_fb';
const LEAD_ST = ['Novo','Contatado','Qualificado','Proposta Enviada','Convertido','Perdido'];
const LEAD_FT = ['Indicação','Instagram','Facebook','Google','Site','LinkedIn','WhatsApp','Evento','Outro'];
const GCAT   = ['Salários','Comissões','Marketing','Infraestrutura','Software/Assinaturas','Impostos','Aluguel','Outras'];
const PAG    = ['PIX','Boleto','Cartão de Crédito','Cartão de Débito','Transferência','Dinheiro'];
const VND_ST = ['Confirmada','Pendente','Cancelada'];
const MO_PT  = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const MO_SH  = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

// ── State ────────────────────────────────────────────────────────────────────
let D = {leads:[],vendas:[],gastos:[],metas:{},socios:['Guilherme','Vinicius','Alisson','Italo']};
let CH = {};
let curMo = new Date().toISOString().slice(0,7);
let curPage = 'dashboard';
let lF = {s:'',st:'',resp:''};
let vF = {s:'',st:'',resp:''};
let gF = {s:'',cat:'',tipo:''};
let db = null;
let unsubs = [];
let refreshTimer = null;

// ── Utils ────────────────────────────────────────────────────────────────────
const uid   = () => Date.now().toString(36) + Math.random().toString(36).slice(2,6);
const R$    = v => new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(v||0);
const fmtD  = d => d ? new Date(d+'T12:00:00').toLocaleDateString('pt-BR') : '—';
const today = () => new Date().toISOString().slice(0,10);
const moLabel = m => { if(!m)return''; const[y,mo]=m.split('-'); return MO_SH[+mo-1]+'/'+y; };
const moName  = m => { if(!m)return''; const[y,mo]=m.split('-'); return MO_PT[+mo-1]+' '+y; };
const esc     = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const shiftMo = (m,d) => { const[y,mo]=m.split('-').map(Number); const dt=new Date(y,mo-1+d,1); return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}`; };

// ── Toast ────────────────────────────────────────────────────────────────────
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(el._t); el._t = setTimeout(() => el.classList.remove('show'), 3000);
}

// ── Badges ───────────────────────────────────────────────────────────────────
function updateBadges() {
  const nl = D.leads.filter(l=>l.data?.slice(0,7)===curMo).length;
  const nv = D.vendas.filter(v=>v.data?.slice(0,7)===curMo).length;
  const bl = document.getElementById('bl'), bv = document.getElementById('bv');
  if(bl){bl.textContent=nl; bl.classList.toggle('hidden',!nl);}
  if(bv){bv.textContent=nv; bv.classList.toggle('hidden',!nv);}
}

// ── Local Storage ────────────────────────────────────────────────────────────
function localSave() {
  localStorage.setItem(LSK, JSON.stringify(D));
  updateBadges();
}
function localLoad() {
  try { const s=localStorage.getItem(LSK); if(s) D={...D,...JSON.parse(s)}; } catch(e){}
}

// ── Firebase ─────────────────────────────────────────────────────────────────
function loadFBConfig() { try{ return JSON.parse(localStorage.getItem(FBK)||'null'); }catch(e){return null;} }
function saveFBConfig(cfg) { localStorage.setItem(FBK, JSON.stringify(cfg)); }

function initFirebase(cfg) {
  try {
    if (firebase.apps.length) firebase.apps[0].delete();
    firebase.initializeApp(cfg);
    db = firebase.firestore();
    setupFBListeners();
    updateFBStatus(true);
    toast('🔥 Firebase conectado! Sincronizando...');
    return true;
  } catch(e) {
    console.error('Firebase error:', e);
    toast('❌ Erro ao conectar: ' + e.message);
    db = null;
    updateFBStatus(false);
    return false;
  }
}

function updateFBStatus(on) {
  const el = document.getElementById('fb-status');
  if(!el) return;
  el.className = 'fb-badge ' + (on?'fb-on':'fb-off');
  el.innerHTML = `<i class="fas fa-circle text-[8px]"></i>${on?'Online':'Local'}`;
}

function setupFBListeners() {
  unsubs.forEach(u => u());
  unsubs = [];
  const cols = ['leads','vendas','gastos'];
  cols.forEach(col => {
    const u = db.collection(col).onSnapshot(snap => {
      D[col] = snap.docs.map(d => ({...d.data(), id: d.id}));
      scheduleRefresh();
    }, err => console.error(col, err));
    unsubs.push(u);
  });
  unsubs.push(db.collection('metas').onSnapshot(snap => {
    D.metas = {};
    snap.docs.forEach(d => { D.metas[d.id] = d.data(); });
    scheduleRefresh();
  }));
  unsubs.push(db.collection('config').doc('socios').onSnapshot(doc => {
    if(doc.exists) D.socios = doc.data().lista || D.socios;
    scheduleRefresh();
  }));
}

function scheduleRefresh() {
  clearTimeout(refreshTimer);
  refreshTimer = setTimeout(() => { go(curPage); updateBadges(); }, 250);
}

// ── Write helpers ─────────────────────────────────────────────────────────────
async function dbSet(col, id, data) {
  if(db) { await db.collection(col).doc(id).set(data); }
  else { localSave(); }
}
async function dbDel(col, id) {
  if(db) { await db.collection(col).doc(id).delete(); }
  else { localSave(); }
}
async function dbSetConfig(key, data) {
  if(db) { await db.collection('config').doc(key).set(data); }
  else { localSave(); }
}

// ── Export / Import ───────────────────────────────────────────────────────────
function doExport() {
  const blob = new Blob([JSON.stringify(D,null,2)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `kodaforge-${today()}.json`;
  a.click(); URL.revokeObjectURL(a.href);
  toast('✅ Dados exportados!');
}
function doImport() { document.getElementById('impf').click(); }

document.getElementById('impf').addEventListener('change', e => {
  const f = e.target.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = async ev => {
    try {
      const imp = JSON.parse(ev.target.result);
      if(!confirm('Substituir todos os dados pelos do arquivo?')) return;
      if(db) {
        const cols = ['leads','vendas','gastos'];
        for(const col of cols) {
          for(const item of (imp[col]||[])) await db.collection(col).doc(item.id).set(item);
          if(imp.metas) for(const [k,v] of Object.entries(imp.metas)) await db.collection('metas').doc(k).set(v);
          if(imp.socios) await dbSetConfig('socios',{lista:imp.socios});
        }
      } else { D={...D,...imp}; localSave(); go(curPage); }
      toast('✅ Importado!');
    } catch(err) { alert('Arquivo inválido.'); }
  };
  r.readAsText(f); e.target.value='';
});

// ── Navigation ────────────────────────────────────────────────────────────────
const TITLES = {dashboard:'Dashboard',leads:'Leads',vendas:'Vendas',gastos:'Gastos',metas:'Metas',relatorios:'Relatórios',config:'Configurações'};

function go(page) {
  curPage = page;
  document.querySelectorAll('[data-action="nav"]').forEach(b => {
    b.classList.toggle('na', b.dataset.page === page);
  });
  document.getElementById('ptitle').textContent = TITLES[page] || page;
  Object.values(CH).forEach(c => { try{c.destroy();}catch(e){} });
  CH = {};
  const mc = document.getElementById('mc'); mc.innerHTML = '';
  ({dashboard:renderDash,leads:renderLeads,vendas:renderVendas,gastos:renderGastos,
    metas:renderMetas,relatorios:renderRel,config:renderConfig}[page]||renderDash)(mc);
}

// ── Metrics ───────────────────────────────────────────────────────────────────
function metrics(m) {
  const leads  = D.leads.filter(l=>l.data?.slice(0,7)===m);
  const vendas = D.vendas.filter(v=>v.data?.slice(0,7)===m&&v.status!=='Cancelada');
  const gastos = D.gastos.filter(g=>g.data?.slice(0,7)===m);
  const bruto  = vendas.reduce((s,v)=>s+(+v.valor||0),0);
  const tG     = gastos.reduce((s,g)=>s+(+g.valor||0),0);
  const meta   = D.metas[m]||{};
  return {leads:{n:leads.length,meta:meta.leads||0}, vendas:{n:vendas.length,meta:meta.vendas||0},
    bruto, tG, liquido:bruto-tG, ticket:vendas.length?bruto/vendas.length:0,
    conv:leads.length?(leads.filter(l=>l.status==='Convertido').length/leads.length*100):0, meta};
}

// ── Dashboard ─────────────────────────────────────────────────────────────────
function renderDash(c) {
  const m = metrics(curMo);
  const fp = m.meta.faturamento>0 ? Math.min(m.bruto/m.meta.faturamento*100,100) : 0;
  const lp = m.meta.leads>0 ? Math.min(m.leads.n/m.meta.leads*100,100) : 0;
  const vp = m.meta.vendas>0 ? Math.min(m.vendas.n/m.meta.vendas*100,100) : 0;
  const gp = m.meta.gastos_max>0 ? Math.min(m.tG/m.meta.gastos_max*100,100) : 0;

  const prg = (pct,color) => `<div class="pb mt-2"><div class="pf ${color}" style="width:${pct}%"></div></div><div class="text-right text-xs mt-0.5 text-slate-400">${pct.toFixed(0)}%</div>`;

  c.innerHTML = `
  <div class="flex flex-wrap items-center justify-between gap-3 mb-5">
    <div><h2 class="text-lg font-bold text-slate-800">Visão Geral</h2><p class="text-slate-500 text-sm">Resumo mensal</p></div>
    <div class="flex items-center gap-2">
      <button data-action="prev-month" class="w-8 h-8 rounded-lg bg-white border border-slate-200 text-slate-500 hover:bg-slate-50 flex items-center justify-center cursor-pointer"><i class="fas fa-chevron-left text-xs"></i></button>
      <div class="bg-white border border-slate-200 rounded-lg px-4 py-1.5 text-sm font-semibold text-slate-700 min-w-[140px] text-center">${moName(curMo)}</div>
      <button data-action="next-month" class="w-8 h-8 rounded-lg bg-white border border-slate-200 text-slate-500 hover:bg-slate-50 flex items-center justify-center cursor-pointer"><i class="fas fa-chevron-right text-xs"></i></button>
    </div>
  </div>

  <div class="grid grid-cols-2 lg:grid-cols-3 gap-3 mb-4">
    <div class="card kpi p-4"><div class="flex items-start justify-between"><div><p class="text-slate-400 text-xs font-semibold uppercase tracking-wider">Fat. Bruto</p><p class="text-xl font-bold text-indigo-600 mt-1">${R$(m.bruto)}</p>${m.meta.faturamento?`<div class="text-xs text-slate-400 mt-0.5">Meta ${R$(m.meta.faturamento)}</div>${prg(fp,'bg-indigo-500')}`:'<div class="text-xs text-slate-400 mt-1">Sem meta definida</div>'}</div><div class="w-9 h-9 bg-indigo-50 rounded-xl flex items-center justify-center ml-2"><i class="fas fa-dollar-sign text-indigo-600"></i></div></div></div>
    <div class="card kpi p-4"><div class="flex items-start justify-between"><div><p class="text-slate-400 text-xs font-semibold uppercase tracking-wider">Fat. Líquido</p><p class="text-xl font-bold mt-1 ${m.liquido>=0?'text-green-600':'text-red-600'}">${R$(m.liquido)}</p><div class="text-xs text-slate-400 mt-1">Bruto − Gastos</div></div><div class="w-9 h-9 ${m.liquido>=0?'bg-green-50':'bg-red-50'} rounded-xl flex items-center justify-center ml-2"><i class="fas fa-coins ${m.liquido>=0?'text-green-600':'text-red-600'}"></i></div></div></div>
    <div class="card kpi p-4"><div class="flex items-start justify-between"><div><p class="text-slate-400 text-xs font-semibold uppercase tracking-wider">Gastos</p><p class="text-xl font-bold text-amber-500 mt-1">${R$(m.tG)}</p>${m.meta.gastos_max?`<div class="text-xs text-slate-400 mt-0.5">Limite ${R$(m.meta.gastos_max)}</div>${prg(gp,gp>=100?'bg-red-500':'bg-amber-400')}`:'<div class="text-xs text-slate-400 mt-1">Sem limite definido</div>'}</div><div class="w-9 h-9 bg-amber-50 rounded-xl flex items-center justify-center ml-2"><i class="fas fa-receipt text-amber-500"></i></div></div></div>
    <div class="card kpi p-4"><div class="flex items-start justify-between"><div><p class="text-slate-400 text-xs font-semibold uppercase tracking-wider">Leads</p><p class="text-xl font-bold text-violet-600 mt-1">${m.leads.n}</p>${m.meta.leads?`<div class="text-xs text-slate-400 mt-0.5">Meta ${m.meta.leads}</div>${prg(lp,'bg-violet-500')}`:'<div class="text-xs text-slate-400 mt-1">Sem meta definida</div>'}</div><div class="w-9 h-9 bg-violet-50 rounded-xl flex items-center justify-center ml-2"><i class="fas fa-user-plus text-violet-600"></i></div></div></div>
    <div class="card kpi p-4"><div class="flex items-start justify-between"><div><p class="text-slate-400 text-xs font-semibold uppercase tracking-wider">Vendas</p><p class="text-xl font-bold text-sky-600 mt-1">${m.vendas.n}</p>${m.meta.vendas?`<div class="text-xs text-slate-400 mt-0.5">Meta ${m.meta.vendas}</div>${prg(vp,'bg-sky-500')}`:'<div class="text-xs text-slate-400 mt-1">Sem meta definida</div>'}</div><div class="w-9 h-9 bg-sky-50 rounded-xl flex items-center justify-center ml-2"><i class="fas fa-handshake text-sky-600"></i></div></div></div>
    <div class="card kpi p-4"><div class="flex items-start justify-between"><div><p class="text-slate-400 text-xs font-semibold uppercase tracking-wider">Ticket Médio</p><p class="text-xl font-bold text-pink-600 mt-1">${R$(m.ticket)}</p><div class="text-xs text-slate-400 mt-1">Conversão: ${m.conv.toFixed(1)}%</div></div><div class="w-9 h-9 bg-pink-50 rounded-xl flex items-center justify-center ml-2"><i class="fas fa-tag text-pink-600"></i></div></div></div>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-3 gap-3 mb-3">
    <div class="card p-5 lg:col-span-2">

function recentList(arr, nameF, subF, badgeFn, statusF) {
  const rows = [...arr].sort((a,b)=>(b.data||'')>(a.data||'')?1:-1).slice(0,5);
  if(!rows.length) return `<div class="em py-6"><i class="fas fa-inbox"></i><p class="text-sm">Nenhum registro ainda</p></div>`;
  return rows.map(r=>`<div class="flex justify-between items-center py-2 border-b border-slate-100 last:border-0">
    <div><p class="font-medium text-sm text-slate-700">${esc(r[nameF]||'')}</p><p class="text-xs text-slate-400">${esc(r[subF]||'—')} · ${fmtD(r.data)}</p></div>
    <span class="badge ${window[badgeFn](r[statusF])}">${esc(r[statusF]||'—')}</span>
  </div>`).join('');
}
function recentVendas() {
  const rows = [...D.vendas].sort((a,b)=>(b.data||'')>(a.data||'')?1:-1).slice(0,5);
  if(!rows.length) return `<div class="em py-6"><i class="fas fa-handshake"></i><p class="text-sm">Nenhuma venda ainda</p></div>`;
  return rows.map(v=>`<div class="flex justify-between items-center py-2 border-b border-slate-100 last:border-0">
    <div><p class="font-medium text-sm text-slate-700">${esc(v.cliente||'')}</p><p class="text-xs text-slate-400">${esc(v.responsavel||'—')} · ${fmtD(v.data)}</p></div>
    <span class="font-semibold text-sm text-green-600">${R$(v.valor)}</span>
  </div>`).join('');
}

function leadBadge(s){return{Novo:'bn',Contatado:'bc',Qualificado:'bq','Proposta Enviada':'bpr',Convertido:'bco',Perdido:'bpe'}[s]||'bn';}
window.leadBadge = leadBadge;
function vendaBadge(s){return{Confirmada:'bcf',Pendente:'bpd',Cancelada:'bca'}[s]||'bi';}

function last6() { const ms=[]; for(let i=5;i>=0;i--) ms.push(shiftMo(curMo,-i)); return ms; }
function initFatChart() {
  const ctx=document.getElementById('ch-fat'); if(!ctx) return;
  const ms=last6();
  const b=ms.map(m=>D.vendas.filter(v=>v.data?.slice(0,7)===m&&v.status!=='Cancelada').reduce((s,v)=>s+(+v.valor||0),0));
  const g=ms.map(m=>D.gastos.filter(v=>v.data?.slice(0,7)===m).reduce((s,v)=>s+(+v.valor||0),0));
  const l=b.map((v,i)=>v-g[i]);
  CH.fat=new Chart(ctx,{type:'bar',data:{labels:ms.map(moLabel),datasets:[
    {label:'Bruto',data:b,backgroundColor:'rgba(99,102,241,.7)',borderRadius:5},
    {label:'Líquido',data:l,backgroundColor:'rgba(34,197,94,.7)',borderRadius:5},
    {label:'Gastos',data:g,backgroundColor:'rgba(251,191,36,.7)',borderRadius:5},
  ]},options:{responsive:true,maintainAspectRatio:false,
    plugins:{legend:{position:'bottom',labels:{boxWidth:10,font:{size:10}}}},
    scales:{y:{ticks:{callback:v=>'R$'+(v/1000).toFixed(0)+'k',font:{size:10}},grid:{color:'#f1f5f9'}},x:{ticks:{font:{size:10}},grid:{display:false}}}}});
}
function initLeadsChart() {
  const ctx=document.getElementById('ch-leads'); if(!ctx) return;
  const counts=LEAD_ST.map(s=>D.leads.filter(l=>l.status===s).length);
  if(!counts.some(Boolean)){
    document.getElementById('ch-leads-wrap').innerHTML='<div class="em"><i class="fas fa-chart-pie"></i><p class="text-sm">Sem leads</p></div>'; return;
  }
  CH.leads=new Chart(ctx,{type:'doughnut',data:{labels:LEAD_ST,datasets:[{data:counts,backgroundColor:['#3b82f6','#f59e0b','#8b5cf6','#ec4899','#22c55e','#ef4444'],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,cutout:'62%',plugins:{legend:{position:'bottom',labels:{boxWidth:10,font:{size:10}}}}}});
}

function exportCSV() {
  const all=[...new Set([...D.leads.map(l=>l.data?.slice(0,7)),...D.vendas.map(v=>v.data?.slice(0,7)),...D.gastos.map(g=>g.data?.slice(0,7)),curMo])].filter(Boolean).sort().reverse();
  let csv='Mês,Fat. Bruto,Fat. Líquido,Gastos,Leads,Vendas,Ticket Médio\n';
  all.forEach(mo=>{const m=metrics(mo);csv+=`${moLabel(mo)},${m.bruto.toFixed(2)},${m.liquido.toFixed(2)},${m.tG.toFixed(2)},${m.leads.n},${m.vendas.n},${m.ticket.toFixed(2)}\n`;});
  const blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`relatorio-${today()}.csv`;a.click();
  toast('✅ CSV exportado!');
}

async function clearAll() {
  if(!confirm('Apagar TODOS os dados?')) return;

  if(db){
    const cols=['leads','vendas','gastos','metas'];
    for(const col of cols){const snap=await db.collection(col).get();for(const d of snap.docs) await d.ref.delete();}
  } else { D={leads:[],vendas:[],gastos:[],metas:{},socios:D.socios}; localSave(); }
  toast('🗑️ Dados limpos.'); go('dashboard');
}
function disconnectFB() {
  unsubs.forEach(u=>u()); unsubs=[];
  db=null; localStorage.removeItem(FBK);

}

// ── Modal ─────────────────────────────────────────────────────────────────────
function showModal(html){document.getElementById('mdiv').innerHTML=html; document.getElementById('mwrap').classList.add('open');}
function closeModal(){document.getElementById('mwrap').classList.remove('open');}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
document.getElementById('mwrap').addEventListener('click', e=>{if(e.target===document.getElementById('mwrap'))closeModal();});

// ── Event Delegation ──────────────────────────────────────────────────────────
document.addEventListener('click', e => {
  const el = e.target.closest('[data-action]');
  if(!el) return;
  const action = el.dataset.action;
  const id = el.dataset.id || null;
  const page = el.dataset.page || null;
  const handlers = {
    'nav':          () => go(page),
    'prev-month':   () => { curMo=shiftMo(curMo,-1); go(curPage); },
    'next-month':   () => { curMo=shiftMo(curMo,1);  go(curPage); },
    'new-lead':     () => openLeadModal(),
    'edit-lead':    () => openLeadModal(id),
    'del-lead':     () => delLead(id),
    'new-venda':    () => openVendaModal(),
    'edit-venda':   () => openVendaModal(id),
    'del-venda':    () => delVenda(id),
    'new-gasto':    () => openGastoModal(),
    'edit-gasto':   () => openGastoModal(id),
    'del-gasto':    () => delGasto(id),
    'close-modal':  () => closeModal(),
    'export':       () => doExport(),
    'import':       () => doImport(),
    'demo':         () => loadDemo(),
    'export-csv':   () => exportCSV(),
    'print':        () => window.print(),
    'add-socio':    () => addSocio(),
    'rm-socio':     () => rmSocio(+id),
    'save-socios':  () => saveSocios(),
    'clear-all':    () => clearAll(),
    'disconnect-fb':() => disconnectFB(),
  };
  if(handlers[action]) handlers[action]();
});

// ── Boot ──────────────────────────────────────────────────────────────────────
localLoad();
const savedCfg = loadFBConfig();
if(savedCfg) initFirebase(savedCfg);
go('dashboard');
updateBadges();
</script>
